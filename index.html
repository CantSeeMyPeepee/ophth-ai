<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mainland Eye AI</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon.png">

<style>
body { font-family:-apple-system; margin:0; background:#0f1115; color:#e5e7eb; }
.header { background:#1a1d23; padding:16px; text-align:center; }
.container { padding:14px; }

.card {
  background:#1a1d23;
  border-radius:16px;
  padding:14px;
  margin-bottom:10px;
}

input {
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  background:#111318;
  color:white;
  border:1px solid #2a2f38;
}

button {
  padding:10px;
  border-radius:10px;
  background:#2f343d;
  color:white;
  border:1px solid #3a404b;
  margin:4px;
}

.row { display:flex; flex-wrap:wrap; gap:6px; }
.quick { flex:1; }

pre {
  background:#111318;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">Mainland Eye AI</div>

<div class="container">

<!-- CC -->
<div class="card">
<div class="row">
<button class="quick" onclick="setCC('blurred vision')">Blur</button>
<button class="quick" onclick="setCC('pain')">Pain</button>
<button class="quick" onclick="setCC('floaters')">Floaters</button>
</div>
<input id="cc" placeholder="Chief Complaint">
</div>

<!-- VA -->
<div class="card">
<b>Visual Acuity</b>

<div class="row">
<button onclick="setVA('od','20/20')">OD 20/20</button>
<button onclick="setVA('od','20/40')">OD 20/40</button>
<button onclick="setVA('os','20/20')">OS 20/20</button>
<button onclick="setVA('os','20/40')">OS 20/40</button>
</div>

<input id="va_od" placeholder="VA OD">
<input id="va_os" placeholder="VA OS">
</div>

<!-- IOP -->
<div class="card">
<b>IOP</b>

<div class="row">
<button onclick="setIOP('od',15)">OD 15</button>
<button onclick="setIOP('od',25)">OD 25</button>
<button onclick="setIOP('os',15)">OS 15</button>
<button onclick="setIOP('os',25)">OS 25</button>
</div>

<input id="iop_od" placeholder="IOP OD">
<input id="iop_os" placeholder="IOP OS">
</div>

<button onclick="analyze()">Analyze</button>

<pre id="out"></pre>

</div>

<script>

const API = "https://ophth-ai.onrender.com";

// SETTERS
function setCC(v){ cc.value = v; }
function setVA(eye, val){
  if(eye === "od") va_od.value = val;
  else va_os.value = val;
}
function setIOP(eye, val){
  if(eye === "od") iop_od.value = val;
  else iop_os.value = val;
}

// AI CALL
async function analyze(){

  let res = await fetch(API + "/ai", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      cc: cc.value,
      va_od: va_od.value,
      va_os: va_os.value,
      iop_od: iop_od.value,
      iop_os: iop_os.value
    })
  });

  let data = await res.json();

  out.innerText = data.result;
}

</script>

</body>
</html>
