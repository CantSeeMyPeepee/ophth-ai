<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mainland Eye AI</title>

<style>
body { font-family:-apple-system; margin:0; background:#f5f7fa; }

.header {
  background:#0a84ff;
  color:white;
  padding:16px;
  text-align:center;
  font-weight:600;
}

.container { padding:16px; }

.card {
  background:white;
  border-radius:16px;
  padding:18px;
  margin-bottom:12px;
  text-align:center;
  font-size:18px;
  font-weight:600;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  cursor:pointer;
}

.hidden { display:none; }

button {
  width:100%;
  padding:14px;
  margin-top:8px;
  border:none;
  border-radius:12px;
  background:#0a84ff;
  color:white;
}

.back { background:#e5e7eb; color:black; }

iframe {
  width:100%;
  height:75vh;
  border:none;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="header">Mainland Eye AI</div>

<div class="container">

<!-- HOME -->
<div id="home">
<div class="card" onclick="show('ai')">🧠 AI Mode</div>
<div class="card" onclick="show('patients')">👤 Patient Lookup</div>
<div class="card" onclick="show('research')">🔬 Research</div>
</div>

<!-- AI -->
<div id="ai" class="hidden">
<button class="back" onclick="show('home')">← Back</button>
<div class="card">AI Mode (your existing system stays here)</div>
</div>

<!-- PATIENTS -->
<div id="patients" class="hidden">
<button class="back" onclick="show('home')">← Back</button>
<div class="card">Patient Lookup (your existing system stays here)</div>
</div>

<!-- RESEARCH MENU -->
<div id="research" class="hidden">
<button class="back" onclick="show('home')">← Back</button>

<div class="card" onclick="show('meds')">💊 Meds</div>
<div class="card" onclick="show('oct')">🧠 OCT Cases</div>
<div class="card" onclick="show('diseases')">👁️ Ocular Diseases</div>

</div>

<!-- MEDS -->
<div id="meds" class="hidden">
<button class="back" onclick="show('research')">← Back</button>
<div class="card">Medication reference (your drug DB stays here)</div>
</div>

<!-- OCT CASES -->
<div id="oct" class="hidden">
<button class="back" onclick="show('research')">← Back</button>

<!-- Option 1: embedded -->
<iframe src="https://www.octcases.com"></iframe>

<!-- Option 2 (backup link) -->
<button onclick="window.open('https://www.octcases.com','_blank')">
Open Full Site
</button>

</div>

<!-- OCULAR DISEASES -->
<div id="diseases" class="hidden">
<button class="back" onclick="show('research')">← Back</button>

<div class="card">Coming next: Disease database (AMD, glaucoma, etc)</div>

</div>

</div>

<script>

function show(page){
 document.querySelectorAll("#home,#ai,#patients,#research,#meds,#oct,#diseases")
 .forEach(d=>d.classList.add("hidden"));

 document.getElementById(page).classList.remove("hidden");
}

</script>

</body>
</html>
