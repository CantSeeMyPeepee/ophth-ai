<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mainland Eye AI</title>

<style>
body { font-family:-apple-system; margin:0; background:#f5f7fa; }
.header { background:#0a84ff; color:white; padding:16px; text-align:center; font-weight:600; }
.container { padding:16px; }

.card {
  background:white;
  border-radius:16px;
  padding:16px;
  margin-bottom:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  margin:6px 0;
}

button {
  width:100%;
  padding:14px;
  margin-top:6px;
  border:none;
  border-radius:12px;
  background:#0a84ff;
  color:white;
}

.back { background:#e5e7eb; color:black; }

.result {
  padding:10px;
  border-bottom:1px solid #eee;
}

.alert {
  background:#ffe5e5;
  color:#b30000;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
  font-size:14px;
}

.good {
  background:#e6f7ff;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
}

.hidden { display:none; }

pre { white-space:pre-wrap; font-size:14px; }
</style>
</head>

<body>

<div class="header">Mainland Eye AI</div>

<div class="container">

<!-- HOME -->
<div id="home">
<div class="card" onclick="show('ai')">🧠 AI Mode</div>
<div class="card" onclick="show('patients')">👤 Patient Lookup</div>
<div class="card" onclick="show('research')">🔬 Research</div>
</div>

<!-- AI -->
<div id="ai" class="hidden">

<button class="back" onclick="show('home')">← Back</button>

<div class="card">
<b id="patientHeader">No patient</b>
</div>

<div id="alerts"></div>

<input id="cc" placeholder="Chief Complaint">
<input id="va" placeholder="VA (e.g. 20/40)">
<input id="iop" placeholder="IOP">

<button onclick="analyze()">Analyze + Save Visit</button>

<div class="card">
<b>Visit History</b>
<div id="history"></div>
</div>

<pre id="out"></pre>

</div>

<!-- PATIENTS -->
<div id="patients" class="hidden">

<button class="back" onclick="show('home')">← Back</button>

<input id="search" placeholder="Search..." oninput="searchPatients()">
<div id="results"></div>

<input id="last" placeholder="Last">
<input id="first" placeholder="First">
<input id="dob" placeholder="DOB">

<button onclick="savePatient()">Save</button>

</div>

<!-- RESEARCH -->
<div id="research" class="hidden">
<button class="back" onclick="show('home')">← Back</button>

<div class="card">💊 Meds</div>
<div class="card">🧠 OCT Cases</div>
<div class="card">👁️ Diseases</div>
</div>

</div>

<script>

const API = "https://ophth-ai.onrender.com";

// NAV
function show(p){
 document.querySelectorAll("#home,#ai,#patients,#research")
 .forEach(d=>d.classList.add("hidden"));
 document.getElementById(p).classList.remove("hidden");
}

// DATA
let patients = JSON.parse(localStorage.getItem("patients")||"[]");
let currentPatient = null;

// SAVE PATIENT
function savePatient(){
 let p = {last:last.value, first:first.value, dob:dob.value, visits:[]};
 patients.push(p);
 localStorage.setItem("patients", JSON.stringify(patients));
}

// SEARCH
function searchPatients(){
 let q = search.value.toLowerCase();
 results.innerHTML="";
 patients.forEach(p=>{
   let txt = `${p.last} ${p.first}`.toLowerCase();
   if(txt.includes(q)){
     let d=document.createElement("div");
     d.className="result";
     d.innerText=`${p.last}, ${p.first}`;
     d.onclick=()=>selectPatient(p);
     results.appendChild(d);
   }
 });
}

// SELECT
function selectPatient(p){
 currentPatient=p;
 localStorage.setItem("currentPatient", JSON.stringify(p));
 patientHeader.innerText=`${p.last}, ${p.first}`;
 show('ai');
 renderHistory();
 analyzeTrends();
}

// LOAD LAST
window.onload = ()=>{
 let p=JSON.parse(localStorage.getItem("currentPatient"));
 if(p){
   currentPatient=p;
   patientHeader.innerText=`${p.last}, ${p.first}`;
   renderHistory();
   analyzeTrends();
 }
};

// HISTORY
function renderHistory(){
 history.innerHTML="";
 if(!currentPatient) return;

 currentPatient.visits.slice().reverse().forEach(v=>{
   let d=document.createElement("div");
   d.className="result";
   d.innerText=`${v.date} | VA ${v.va} | IOP ${v.iop}`;
   history.appendChild(d);
 });
}

// TREND ANALYSIS
function analyzeTrends(){
 alerts.innerHTML="";

 if(!currentPatient || currentPatient.visits.length < 2) return;

 let visits = currentPatient.visits;
 let last = visits[visits.length-1];
 let prev = visits[visits.length-2];

 // IOP trend
 if(parseInt(last.iop) > parseInt(prev.iop)){
   alerts.innerHTML += `<div class="alert">⚠️ IOP rising</div>`;
 }

 // VA decline
 if(last.va > prev.va){
   alerts.innerHTML += `<div class="alert">⚠️ Vision worsening</div>`;
 }
}

// AI
async function analyze(){

 let today = new Date().toLocaleDateString();

 let visit = {
   date: today,
   cc: cc.value,
   va: va.value,
   iop: iop.value
 };

 currentPatient.visits.push(visit);

 let i = patients.findIndex(p=>p.last===currentPatient.last && p.first===currentPatient.first);
 patients[i]=currentPatient;
 localStorage.setItem("patients", JSON.stringify(patients));

 renderHistory();
 analyzeTrends();

 let historyText = currentPatient.visits.map(v=>`${v.date}: VA ${v.va}, IOP ${v.iop}`).join("\\n");

 let res = await fetch(API + "/ai", {
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body: JSON.stringify({
     cc: cc.value,
     va: va.value,
     iop: iop.value,
     history: historyText
   })
 });

 let data = await res.json();

 out.innerText =
 "History:\n" + historyText +
 "\n----------------\n" +
 data.result;
}

</script>

</body>
</html>
