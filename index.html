<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mainland Eye AI</title>

<meta name="apple-mobile-web-app-title" content="Mainland Eye AI">

<style>
body { font-family:-apple-system; margin:0; background:#f5f7fa; }

.header {
  background:#0a84ff;
  color:white;
  padding:16px;
  text-align:center;
  font-weight:600;
}

.container { padding:16px; }

.card {
  background:white;
  border-radius:16px;
  padding:18px;
  margin-bottom:12px;
  text-align:center;
  font-size:18px;
  font-weight:600;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  cursor:pointer;
}

.hidden { display:none; }

input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  margin:6px 0;
}

button {
  width:100%;
  padding:12px;
  margin-top:6px;
  border:none;
  border-radius:10px;
  background:#0a84ff;
  color:white;
}

.back { background:#e5e7eb; color:black; }

.result { padding:8px; border-bottom:1px solid #eee; cursor:pointer; }

pre { white-space:pre-wrap; font-size:14px; }

.small { font-size:12px; color:#666; }
</style>
</head>

<body>

<div class="header">Mainland Eye AI</div>

<div class="container">

<!-- 🏠 HOME -->
<div id="home">
<div class="card" onclick="show('ai')">🧠 AI Mode</div>
<div class="card" onclick="show('patients')">👤 Patient Search</div>
<div class="card" onclick="show('research')">🔬 Research</div>
</div>

<!-- 🧠 AI MODE -->
<div id="ai" class="hidden">

<button class="back" onclick="show('home')">← Back</button>

<div class="card">
<b id="patientHeader">No patient selected</b>
</div>

<input id="cc" placeholder="Chief Complaint">
<input id="va" placeholder="VA">
<input id="iop" placeholder="IOP">

<button onclick="analyze()">Analyze + Save Visit</button>

<div class="card">
<div class="small">Visit History</div>
<div id="history"></div>
</div>

<pre id="out"></pre>

</div>

<!-- 👤 PATIENT SEARCH -->
<div id="patients" class="hidden">

<button class="back" onclick="show('home')">← Back</button>

<input id="search" placeholder="Search patient..." oninput="searchPatients()">
<div id="results"></div>

<input id="last" placeholder="Last">
<input id="first" placeholder="First">
<input id="dob" placeholder="DOB">

<button onclick="savePatient()">Save Patient</button>

</div>

<!-- 🔬 RESEARCH (DRUGS) -->
<div id="research" class="hidden">

<button class="back" onclick="show('home')">← Back</button>

<input id="drugSearch" placeholder="Search medications..." oninput="searchDrugs()">

<div id="drugResults"></div>

</div>

</div>

<script>

const API = "https://ophth-ai.onrender.com";

// ================= NAV =================
function show(p){
 document.querySelectorAll("#home,#ai,#patients,#research")
 .forEach(d=>d.classList.add("hidden"));

 document.getElementById(p).classList.remove("hidden");
}

// ================= PATIENT SYSTEM =================
let patients = JSON.parse(localStorage.getItem("patients")||"[]");
let currentPatient = null;

function savePatient(){
 let p = {last:last.value, first:first.value, dob:dob.value, visits:[]};
 patients.push(p);
 localStorage.setItem("patients", JSON.stringify(patients));
}

function searchPatients(){
 let q = search.value.toLowerCase();
 results.innerHTML="";

 patients.forEach(p=>{
   let t = `${p.last} ${p.first}`.toLowerCase();
   if(t.includes(q)){
     let d=document.createElement("div");
     d.className="result";
     d.innerText=`${p.last}, ${p.first}`;
     d.onclick=()=>selectPatient(p);
     results.appendChild(d);
   }
 });
}

function selectPatient(p){
 currentPatient = p;
 localStorage.setItem("currentPatient", JSON.stringify(p));
 patientHeader.innerText = `${p.last}, ${p.first} DOB:${p.dob}`;
 show('ai');
 renderHistory();
}

window.onload = ()=>{
 let p = JSON.parse(localStorage.getItem("currentPatient"));
 if(p){
   currentPatient = p;
   patientHeader.innerText = `${p.last}, ${p.first} DOB:${p.dob}`;
   renderHistory();
 }
};

// ================= VISITS =================
function renderHistory(){
 history.innerHTML="";
 if(!currentPatient) return;

 currentPatient.visits.slice().reverse().forEach(v=>{
   let d=document.createElement("div");
   d.className="result";
   d.innerText=`${v.date} | IOP ${v.iop}`;
   history.appendChild(d);
 });
}

async function analyze(){

 let today = new Date().toLocaleDateString();

 let visit = {
   date: today,
   cc: cc.value,
   va: va.value,
   iop: iop.value
 };

 currentPatient.visits.push(visit);

 let i = patients.findIndex(p =>
   p.last===currentPatient.last &&
   p.first===currentPatient.first &&
   p.dob===currentPatient.dob
 );

 patients[i] = currentPatient;
 localStorage.setItem("patients", JSON.stringify(patients));

 renderHistory();

 let res = await fetch(API + "/ai", {
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body: JSON.stringify({
     cc: cc.value,
     va: va.value,
     iop: iop.value
   })
 });

 let data = await res.json();
 out.innerText = data.result;
}

// ================= DRUG DATABASE =================

const drugs = [
 {name:"Prednisolone Acetate", use:"Steroid", note:"Inflammation"},
 {name:"Timolol", use:"Beta Blocker", note:"Lower IOP"},
 {name:"Latanoprost", use:"Prostaglandin", note:"Lower IOP"},
 {name:"Brimonidine", use:"Alpha Agonist", note:"Lower IOP"},
 {name:"Dorzolamide", use:"CAI", note:"Lower IOP"},
 {name:"Moxifloxacin", use:"Antibiotic", note:"Broad spectrum"},
 {name:"Erythromycin", use:"Ointment", note:"Lid infections"},
 {name:"Atropine", use:"Cycloplegic", note:"Dilates pupil"}
];

function searchDrugs(){
 let q = drugSearch.value.toLowerCase();
 drugResults.innerHTML="";

 drugs.forEach(d=>{
   if(d.name.toLowerCase().includes(q)){
     let div=document.createElement("div");
     div.className="result";
     div.innerText=`${d.name} — ${d.use} (${d.note})`;
     drugResults.appendChild(div);
   }
 });
}

</script>

</body>
</html>
