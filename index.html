<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mainland Eye AI</title>

<meta name="apple-mobile-web-app-title" content="Mainland Eye AI">

<style>
body { font-family:-apple-system, Arial; margin:0; background:#f2f4f7; }
.container { padding:12px; }

input {
  width:100%; margin:6px 0; padding:14px;
  font-size:18px; border-radius:12px; border:1px solid #ccc;
}

.row { display:flex; gap:6px; }
.row input { flex:1; }

button {
  padding:16px; width:100%; margin-top:8px;
  background:#007AFF; color:white; border:none;
  border-radius:14px; font-size:18px;
}

.section {
  background:white; padding:14px; margin-top:10px;
  border-radius:14px; box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

h2 {
  margin:0; padding:14px;
  background:#007AFF; color:white;
  text-align:center;
}

.result {
  padding:10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.result:hover {
  background:#f0f7ff;
}

pre { white-space:pre-wrap; }
</style>
</head>

<body>

<h2>Mainland Eye AI</h2>

<div class="container">

<!-- 🔍 SEARCH -->
<div class="section">
<input id="search" placeholder="Search patient (name, phone, address)" oninput="searchPatients()">
<div id="results"></div>
</div>

<!-- 🧾 PATIENT INFO -->
<div class="section">
<div class="row">
<input id="last" placeholder="Last Name">
<input id="first" placeholder="First Name">
<input id="mi" placeholder="MI">
</div>

<input id="dob" placeholder="DOB">
<input id="address" placeholder="Address">

<div class="row">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
</div>

<button onclick="savePatient()">💾 Save Patient</button>
</div>

<!-- 👁️ CLINICAL -->
<div class="section">
<input id="cc" placeholder="Chief Complaint">
<input id="va" placeholder="VA">
<input id="iop" placeholder="IOP">

<button onclick="voice()">🎤 Voice</button>
<button onclick="analyze()">🧠 Analyze</button>
</div>

<!-- OUTPUT -->
<div class="section">
<pre id="out">Ready</pre>
</div>

</div>

<script>

const API = "https://ophth-ai.onrender.com";

// 🧠 LOCAL DATABASE
let patients = JSON.parse(localStorage.getItem("patients") || "[]");

// SAVE PATIENT
function savePatient(){
 let p = {
   last: last.value,
   first: first.value,
   mi: mi.value,
   dob: dob.value,
   address: address.value,
   phone: phone.value,
   email: email.value
 };

 patients.push(p);
 localStorage.setItem("patients", JSON.stringify(patients));
 alert("Patient saved");
}

// SEARCH
function searchPatients(){
 let q = search.value.toLowerCase();
 let resultsDiv = document.getElementById("results");
 resultsDiv.innerHTML = "";

 patients.forEach(p=>{
   let text = `${p.last} ${p.first} ${p.phone} ${p.address}`.toLowerCase();

   if(text.includes(q)){
     let div = document.createElement("div");
     div.className = "result";
     div.innerText = `${p.last}, ${p.first} (${p.phone})`;

     div.onclick = ()=>loadPatient(p);
     resultsDiv.appendChild(div);
   }
 });
}

// LOAD PATIENT
function loadPatient(p){
 last.value = p.last;
 first.value = p.first;
 mi.value = p.mi;
 dob.value = p.dob;
 address.value = p.address;
 phone.value = p.phone;
 email.value = p.email;
}

// VOICE
function voice(){
 let R = new(window.SpeechRecognition || window.webkitSpeechRecognition)();
 R.onresult = e => {
   cc.value += " " + e.results[0][0].transcript;
 };
 R.start();
}

// ANALYZE
async function analyze(){

 let patientInfo = `
${last.value}, ${first.value}
DOB: ${dob.value}
Phone: ${phone.value}
`;

 let res = await fetch(API + "/ai", {
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body: JSON.stringify({
     cc: cc.value,
     va: va.value,
     iop: iop.value,
     patient: patientInfo
   })
 });

 let data = await res.json();

 out.innerText = patientInfo + "\n\n" + data.result;
}

</script>

</body>
</html>
