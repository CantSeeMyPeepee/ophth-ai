<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mainland Eye AI</title>

<style>
body {
  font-family:-apple-system;
  margin:0;
  background:#0f1115;
  color:#e5e7eb;
}

/* 🔥 HEADER */
.header {
  position:sticky;
  top:0;
  background:#1a1d23;
  padding:16px;
  text-align:center;
  font-size:18px;
  font-weight:600;
  border-bottom:1px solid #2a2f38;
  z-index:1000;
}

.container { padding:14px; }

.card {
  background:#1a1d23;
  padding:16px;
  border-radius:16px;
  margin-bottom:12px;
  text-align:center;
  font-size:18px;
}

button {
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2f343d;
  color:white;
  margin:4px;
}

input {
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  background:#111318;
  color:white;
  border:1px solid #2a2f38;
}

.hidden { display:none; }
.step { display:none; }
.active { display:block; }

pre {
  background:#111318;
  padding:10px;
  border-radius:10px;
  white-space:pre-wrap;
}

.med-card {
  background:#1a1d23;
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
  text-align:left;
  font-size:14px;
}
.med-title { font-weight:600; }
.med-section { color:#9ca3af; margin-top:4px; }
</style>
</head>

<body>

<!-- 🔥 GLOBAL HEADER -->
<div class="header">Mainland Eye AI</div>

<div class="container">

<!-- HOME -->
<div id="home">
<div class="card" onclick="show('ai')">🧠 AI Mode</div>
<div class="card" onclick="show('exam')">👁️ Exam</div>
<div class="card" onclick="show('patients')">👤 Patient Lookup</div>
<div class="card" onclick="show('research')">🔬 Research</div>
</div>

<!-- AI -->
<div id="ai" class="hidden">
<button onclick="show('home')">← Back</button>
<input id="ai_input" placeholder="Describe case...">
<button onclick="runAI()">Analyze</button>
<pre id="ai_out"></pre>
</div>

<!-- RESEARCH -->
<div id="research" class="hidden">
<button onclick="show('home')">← Back</button>
<div class="card" onclick="show('meds')">💊 Meds</div>
<div class="card" onclick="show('oct')">🧠 OCT</div>
</div>

<!-- MEDS -->
<div id="meds" class="hidden">
<button onclick="show('research')">← Back</button>

<input id="medSearch" placeholder="Search meds..." oninput="renderMeds()">

<div id="medList"></div>
</div>

<!-- OCT -->
<div id="oct" class="hidden">
<button onclick="show('research')">← Back</button>
<div class="card" onclick="openLink('atlas')">📊 OCT Atlas</div>
<div class="card" onclick="openLink('cases')">📁 Cases</div>
<div class="card" onclick="openLink('articles')">📚 Articles</div>
</div>

</div>

<script>

// NAV
function show(page){
 document.querySelectorAll("#home,#ai,#exam,#patients,#research,#meds,#oct")
 .forEach(p=>p.classList.add("hidden"));
 document.getElementById(page).classList.remove("hidden");
}

// AI
async function runAI(){
 let res = await fetch("https://ophth-ai.onrender.com/ai",{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({cc:ai_input.value})
 });
 let data = await res.json();
 ai_out.innerText = data.result;
}

// OCT LINKS
function openLink(type){
 if(type==="atlas") window.open("https://app.octcases.com/atlas","_blank");
 if(type==="cases") window.open("https://app.octcases.com/cases","_blank");
 if(type==="articles") window.open("https://app.octcases.com/articles","_blank");
}

// MEDS
let meds = [
{name:"Latanoprost",dose:"qhs",use:"glaucoma"},
{name:"Timolol",dose:"BID",use:"glaucoma"},
{name:"Moxifloxacin",dose:"QID",use:"infection"}
];

function renderMeds(){
 let q = medSearch.value.toLowerCase();
 medList.innerHTML = meds
   .filter(m=>m.name.toLowerCase().includes(q))
   .map(m=>`
     <div class="med-card">
       <div class="med-title">${m.name}</div>
       Dose: ${m.dose}<br>
       Use: ${m.use}
     </div>
   `).join("");
}

renderMeds();

</script>

</body>
</html>
