<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mainland Eye AI</title>

<style>
body { font-family:-apple-system; margin:0; background:#0f1115; color:#e5e7eb; }

.header {
  position:sticky;
  top:0;
  background:#1a1d23;
  padding:16px;
  text-align:center;
  font-weight:600;
  border-bottom:1px solid #2a2f38;
}

.container { padding:14px; }

.card {
  background:#1a1d23;
  padding:16px;
  border-radius:16px;
  margin-bottom:12px;
  text-align:center;
}

button {
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2f343d;
  color:white;
  margin:4px;
}

input {
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  background:#111318;
  color:white;
  border:1px solid #2a2f38;
}

.hidden { display:none; }

.disease-card {
  background:#1a1d23;
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
  text-align:left;
}

.disease-title { font-weight:600; }
.disease-section { color:#9ca3af; margin-top:4px; }
</style>
</head>

<body>

<div class="header">Mainland Eye AI</div>

<div class="container">

<!-- HOME -->
<div id="home">
<div class="card" onclick="show('ai')">🧠 AI Mode</div>
<div class="card" onclick="show('exam')">👁️ Exam</div>
<div class="card" onclick="show('patients')">👤 Patient Lookup</div>
<div class="card" onclick="show('research')">🔬 Research</div>
</div>

<!-- RESEARCH -->
<div id="research" class="hidden">
<button onclick="show('home')">← Back</button>

<div class="card" onclick="show('meds')">💊 Meds</div>
<div class="card" onclick="show('diseases')">👁️ Diseases</div>
<div class="card" onclick="show('oct')">🧠 OCT</div>
</div>

<!-- DISEASES -->
<div id="diseases" class="hidden">
<button onclick="show('research')">← Back</button>

<input id="diseaseSearch" placeholder="Search diseases..." oninput="renderDiseases()">

<div id="diseaseList"></div>
</div>

<!-- OCT -->
<div id="oct" class="hidden">
<button onclick="show('research')">← Back</button>
<div class="card" onclick="openLink('atlas')">📊 OCT Atlas</div>
<div class="card" onclick="openLink('cases')">📁 Cases</div>
<div class="card" onclick="openLink('articles')">📚 Articles</div>
</div>

</div>

<script>

// NAV
function show(p){
 document.querySelectorAll("#home,#research,#meds,#diseases,#oct,#ai,#exam,#patients")
 .forEach(x=>x.classList.add("hidden"));
 document.getElementById(p).classList.remove("hidden");
}

// OCT LINKS
function openLink(type){
 if(type==="atlas") window.open("https://app.octcases.com/atlas","_blank");
 if(type==="cases") window.open("https://app.octcases.com/cases","_blank");
 if(type==="articles") window.open("https://app.octcases.com/articles","_blank");
}

// DISEASE DATABASE
let diseases = [

{
name:"Glaucoma",
type:"Ocular",
desc:"Progressive optic neuropathy with elevated IOP",
signs:"High IOP, cupping, RNFL loss",
testing:"OCT RNFL, HVF, pachymetry",
treatment:"Drops, laser, surgery"
},

{
name:"Macular Degeneration",
type:"Ocular",
desc:"Degeneration of macula affecting central vision",
signs:"Drusen, distortion",
testing:"Macular OCT",
treatment:"AREDS, anti-VEGF"
},

{
name:"Retinal Detachment",
type:"Ocular",
desc:"Separation of retina from underlying tissue",
signs:"Flashes, floaters, curtain",
testing:"Dilated exam, OCT",
treatment:"Emergency referral"
},

{
name:"Uveitis",
type:"Ocular",
desc:"Inflammation of uveal tract",
signs:"Pain, photophobia",
testing:"Slit lamp",
treatment:"Steroids"
},

{
name:"Diabetes",
type:"Systemic",
desc:"Affects retinal vasculature",
signs:"Microaneurysms, edema",
testing:"OCT, fundus photo",
treatment:"Anti-VEGF, control A1C"
},

{
name:"Hypertension",
type:"Systemic",
desc:"Causes retinal vascular changes",
signs:"AV nicking, hemorrhages",
testing:"Fundus exam",
treatment:"BP control"
},

{
name:"Autoimmune Disease",
type:"Systemic",
desc:"Can cause uveitis, dry eye",
signs:"Inflammation",
testing:"Labs, slit lamp",
treatment:"Steroids, immunosuppression"
}

];

// RENDER
function renderDiseases(){

 let q = diseaseSearch.value.toLowerCase();

 let list = diseases.filter(d =>
   d.name.toLowerCase().includes(q)
 );

 diseaseList.innerHTML = list.map(d=>`
<div class="disease-card">
<div class="disease-title">${d.name} (${d.type})</div>
<div class="disease-section">Description: ${d.desc}</div>
<div class="disease-section">Signs: ${d.signs}</div>
<div class="disease-section">Testing: ${d.testing}</div>
<div class="disease-section">Treatment: ${d.treatment}</div>
</div>
`).join("");
}

// INIT
renderDiseases();

</script>

</body>
</html>
