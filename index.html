<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mainland Eye AI</title>

<meta name="apple-mobile-web-app-title" content="Mainland Eye AI">

<style>
body { font-family:-apple-system; margin:0; background:#f5f7fa; }

.header {
  background:#0a84ff;
  color:white;
  padding:16px;
  text-align:center;
  font-weight:600;
  font-size:20px;
}

.container { padding:16px; }

.card {
  background:white;
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
  text-align:center;
  font-size:18px;
  font-weight:600;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  cursor:pointer;
}

.hidden { display:none; }

input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  margin:6px 0;
}

.row { display:flex; gap:6px; }
.row input { flex:1; }

button {
  width:100%;
  padding:14px;
  margin-top:6px;
  border:none;
  border-radius:12px;
  background:#0a84ff;
  color:white;
}

.back {
  background:#e5e7eb;
  color:black;
}

pre { white-space:pre-wrap; font-size:14px; }
</style>
</head>

<body>

<div class="header">Mainland Eye AI</div>

<div class="container">

<!-- HOME -->
<div id="home">

<div class="card" onclick="show('ai')">🧠 AI Mode</div>
<div class="card" onclick="show('patients')">👤 Patient Lookup</div>
<div class="card" onclick="show('research')">🔬 Research</div>

</div>

<!-- AI MODE -->
<div id="ai" class="hidden">

<button class="back" onclick="show('home')">← Back</button>

<input id="cc" placeholder="Chief Complaint">
<input id="va" placeholder="VA">
<input id="iop" placeholder="IOP">

<button onclick="voice()">🎤 Voice</button>
<button onclick="analyze()">Analyze</button>

<pre id="out"></pre>

</div>

<!-- PATIENT LOOKUP -->
<div id="patients" class="hidden">

<button class="back" onclick="show('home')">← Back</button>

<input id="search" placeholder="Search patient..." oninput="searchPatients()">
<div id="results"></div>

<div class="row">
<input id="last" placeholder="Last">
<input id="first" placeholder="First">
<input id="dob" placeholder="DOB">
</div>

<button onclick="savePatient()">Save Patient</button>

</div>

<!-- RESEARCH -->
<div id="research" class="hidden">

<button class="back" onclick="show('home')">← Back</button>

<input id="query" placeholder="Ask anything ophthalmology...">
<button onclick="research()">Search</button>

<pre id="researchOut"></pre>

</div>

</div>

<script>

const API = "https://ophth-ai.onrender.com";

// NAVIGATION
function show(page){
 document.querySelectorAll("#home,#ai,#patients,#research")
 .forEach(d=>d.classList.add("hidden"));

 document.getElementById(page).classList.remove("hidden");
}

// ===== AI =====
function voice(){
 let R=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
 R.onresult=e=>cc.value=e.results[0][0].transcript;
 R.start();
}

async function analyze(){
 let res = await fetch(API + "/ai", {
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body: JSON.stringify({
     cc: cc.value,
     va: va.value,
     iop: iop.value
   })
 });

 let data = await res.json();
 out.innerText = data.result;
}

// ===== PATIENTS =====
let patients = JSON.parse(localStorage.getItem("patients")||"[]");

function savePatient(){
 let p = {last:last.value, first:first.value, dob:dob.value};
 patients.push(p);
 localStorage.setItem("patients", JSON.stringify(patients));
}

function searchPatients(){
 let q = search.value.toLowerCase();
 results.innerHTML="";

 patients.forEach(p=>{
   let t = `${p.last} ${p.first} ${p.dob}`.toLowerCase();
   if(t.includes(q)){
     let d=document.createElement("div");
     d.innerText=`${p.last}, ${p.first}`;
     d.onclick=()=>loadPatient(p);
     results.appendChild(d);
   }
 });
}

function loadPatient(p){
 last.value=p.last;
 first.value=p.first;
 dob.value=p.dob;
}

// ===== RESEARCH =====
async function research(){
 let res = await fetch(API + "/ai", {
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body: JSON.stringify({
     cc: query.value
   })
 });

 let data = await res.json();
 researchOut.innerText = data.result;
}

</script>

</body>
</html>
