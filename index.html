<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mainland Eye AI</title>

<meta name="apple-mobile-web-app-title" content="Mainland Eye AI">

<style>
body { font-family:-apple-system; margin:0; background:#f5f7fa; }
.header { background:#0a84ff; color:white; padding:16px; text-align:center; font-weight:600; }

.container { padding:10px; }

.card {
  background:white;
  border-radius:14px;
  padding:10px;
  margin-bottom:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  margin:4px 0;
}

.row { display:flex; gap:6px; flex-wrap:wrap; }

button {
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#0a84ff;
  color:white;
  font-size:14px;
}

.quick {
  background:#e5e7eb;
  color:black;
}

.result { padding:8px; border-bottom:1px solid #eee; cursor:pointer; }

pre { white-space:pre-wrap; font-size:14px; }
</style>
</head>

<body>

<div class="header">Mainland Eye AI</div>

<div class="container">

<!-- 🔍 SEARCH -->
<div class="card">
<input id="search" placeholder="Search patient..." oninput="searchPatients()">
<div id="results"></div>
</div>

<!-- 👤 PATIENT -->
<div class="card">
<div class="row">
<input id="last" placeholder="Last">
<input id="first" placeholder="First">
<input id="dob" placeholder="DOB">
</div>

<button onclick="savePatient()">Save</button>
</div>

<!-- ⚡ QUICK INPUTS -->
<div class="card">

<div class="row">
<button class="quick" onclick="setCC('blurred vision')">Blur</button>
<button class="quick" onclick="setCC('eye pain')">Pain</button>
<button class="quick" onclick="setCC('floaters flashes')">Floaters</button>
<button class="quick" onclick="voice()">🎤</button>
</div>

<input id="cc" placeholder="Chief Complaint">

<div class="row">
<button class="quick" onclick="setVA('20/20')">20/20</button>
<button class="quick" onclick="setVA('20/30')">20/30</button>
<button class="quick" onclick="setVA('20/40')">20/40</button>
<button class="quick" onclick="setVA('20/60')">20/60</button>
</div>

<input id="va" placeholder="VA">

<div class="row">
<button class="quick" onclick="setIOP(12)">12</button>
<button class="quick" onclick="setIOP(16)">16</button>
<button class="quick" onclick="setIOP(20)">20</button>
<button class="quick" onclick="setIOP(24)">24</button>
<button class="quick" onclick="setIOP(30)">30</button>
</div>

<input id="iop" placeholder="IOP">

<button onclick="analyze()">🧠 Analyze</button>

</div>

<!-- 📄 OUTPUT -->
<div class="card">
<pre id="out">Ready</pre>
</div>

</div>

<script>

const API = "https://ophth-ai.onrender.com";

// ===== DATA =====
let patients = JSON.parse(localStorage.getItem("patients") || "[]");

// ===== QUICK SETTERS =====
function setCC(v){ cc.value = v; }
function setVA(v){ va.value = v; }
function setIOP(v){ iop.value = v; }

// ===== SAVE =====
function savePatient(){
 let p = { last:last.value, first:first.value, dob:dob.value };

 let i = patients.findIndex(x =>
   x.last===p.last && x.first===p.first && x.dob===p.dob
 );

 if(i>=0) patients[i]=p;
 else patients.push(p);

 localStorage.setItem("patients", JSON.stringify(patients));
}

// ===== SEARCH =====
function searchPatients(){
 let q = search.value.toLowerCase();
 results.innerHTML="";

 patients.forEach(p=>{
   let txt = `${p.last} ${p.first} ${p.dob}`.toLowerCase();

   if(txt.includes(q)){
     let d=document.createElement("div");
     d.className="result";
     d.innerText=`${p.last}, ${p.first}`;
     d.onclick=()=>loadPatient(p);
     results.appendChild(d);
   }
 });
}

// ===== LOAD =====
function loadPatient(p){
 last.value=p.last;
 first.value=p.first;
 dob.value=p.dob;
}

// ===== VOICE =====
function voice(){
 let R=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
 R.onresult=e=>cc.value=e.results[0][0].transcript;
 R.start();
}

// ===== ANALYZE =====
async function analyze(){

 let patient = `${last.value}, ${first.value} DOB:${dob.value}`;

 let res = await fetch(API + "/ai", {
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body: JSON.stringify({
     cc: cc.value,
     va: va.value,
     iop: iop.value,
     patient
   })
 });

 let data = await res.json();

 out.innerText =
 patient +
 "\n----------------\n" +
 data.result;
}

</script>

</body>
</html>
