<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mainland Eye AI</title>

<meta name="apple-mobile-web-app-title" content="Mainland Eye AI">

<style>
body {
  font-family:-apple-system, Arial;
  margin:0;
  background:#f5f7fa;
}

.header {
  background:#0a84ff;
  color:white;
  padding:16px;
  text-align:center;
  font-size:20px;
  font-weight:600;
}

.container {
  padding:12px;
}

.card {
  background:white;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.06);
}

input {
  width:100%;
  padding:12px;
  margin:4px 0;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:16px;
}

.row {
  display:flex;
  gap:6px;
}
.row input { flex:1; }

button {
  width:100%;
  padding:14px;
  margin-top:6px;
  border:none;
  border-radius:12px;
  background:#0a84ff;
  color:white;
  font-size:16px;
  font-weight:600;
}

.secondary {
  background:#e5e7eb;
  color:black;
}

.result {
  padding:10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.result:hover {
  background:#eef6ff;
}

pre {
  white-space:pre-wrap;
  font-size:14px;
}

.small {
  font-size:12px;
  color:#666;
}
</style>
</head>

<body>

<div class="header">Mainland Eye AI</div>

<div class="container">

<!-- 🔍 SEARCH -->
<div class="card">
<input id="search" placeholder="Search patient..." oninput="searchPatients()">
<div id="results"></div>
</div>

<!-- 🧾 PATIENT -->
<div class="card">
<div class="row">
<input id="last" placeholder="Last">
<input id="first" placeholder="First">
<input id="mi" placeholder="MI">
</div>

<input id="dob" placeholder="DOB">
<input id="address" placeholder="Address">

<div class="row">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
</div>

<div class="row">
<button onclick="savePatient()">Save</button>
<button class="secondary" onclick="clearPatient()">New</button>
</div>
</div>

<!-- 👁️ CLINICAL -->
<div class="card">
<div class="row">
<input id="cc" placeholder="Chief Complaint">
<button onclick="voice()">🎤</button>
</div>

<div class="row">
<input id="va" placeholder="VA">
<input id="iop" placeholder="IOP">
</div>

<div class="row">
<button onclick="analyze()">Analyze</button>
<button class="secondary" onclick="copyNote()">Copy</button>
</div>
</div>

<!-- OUTPUT -->
<div class="card">
<div class="small">Clinical Output</div>
<pre id="out">Ready</pre>
</div>

</div>

<script>

const API = "https://ophth-ai.onrender.com";

// ===== DATABASE =====
let patients = JSON.parse(localStorage.getItem("patients") || "[]");

// ===== SAVE / UPDATE =====
function savePatient(){
 let existingIndex = patients.findIndex(p =>
   p.last === last.value &&
   p.first === first.value &&
   p.dob === dob.value
 );

 let patient = {
   last:last.value,
   first:first.value,
   mi:mi.value,
   dob:dob.value,
   address:address.value,
   phone:phone.value,
   email:email.value
 };

 if(existingIndex >= 0){
   patients[existingIndex] = patient;
 } else {
   patients.push(patient);
 }

 localStorage.setItem("patients", JSON.stringify(patients));
}

// ===== CLEAR =====
function clearPatient(){
 document.querySelectorAll("input").forEach(i=>i.value="");
}

// ===== SEARCH =====
function searchPatients(){
 let q = search.value.toLowerCase();
 results.innerHTML = "";

 patients.forEach(p=>{
   let text = `${p.last} ${p.first} ${p.phone} ${p.address}`.toLowerCase();

   if(text.includes(q)){
     let div = document.createElement("div");
     div.className = "result";
     div.innerText = `${p.last}, ${p.first} (${p.phone})`;

     div.onclick = ()=>loadPatient(p);
     results.appendChild(div);
   }
 });
}

// ===== LOAD =====
function loadPatient(p){
 last.value = p.last;
 first.value = p.first;
 mi.value = p.mi;
 dob.value = p.dob;
 address.value = p.address;
 phone.value = p.phone;
 email.value = p.email;
}

// ===== VOICE =====
function voice(){
 let R = new(window.SpeechRecognition || window.webkitSpeechRecognition)();
 R.onresult = e => {
   cc.value += " " + e.results[0][0].transcript;
 };
 R.start();
}

// ===== ANALYZE =====
async function analyze(){

 let patientInfo = `
${last.value}, ${first.value}
DOB: ${dob.value}
Phone: ${phone.value}
`;

 let res = await fetch(API + "/ai", {
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body: JSON.stringify({
     cc: cc.value,
     va: va.value,
     iop: iop.value,
     patient: patientInfo
   })
 });

 let data = await res.json();

 out.innerText =
 patientInfo +
 "\n-------------------\n" +
 data.result;
}

// ===== COPY =====
function copyNote(){
 navigator.clipboard.writeText(out.innerText);
 alert("Copied");
}

</script>

</body>
</html>
