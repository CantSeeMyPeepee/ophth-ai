<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mainland Eye AI</title>

<style>
body { font-family:-apple-system; margin:0; background:#0f1115; color:#e5e7eb; }
.container { padding:14px; }

.step { display:none; }
.active { display:block; }

.card {
  background:#1a1d23;
  padding:16px;
  border-radius:16px;
  margin-bottom:12px;
}

button {
  padding:12px;
  margin:6px;
  border:none;
  border-radius:10px;
  background:#2f343d;
  color:white;
}

.row { display:flex; flex-wrap:wrap; gap:6px; }

input {
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #2a2f38;
  background:#111318;
  color:white;
}

pre {
  background:#111318;
  padding:12px;
  border-radius:10px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<!-- STEP 1 -->
<div id="step1" class="step active">
<div class="card">
<h3>Chief Complaint</h3>
<div class="row">
<button onclick="setCC('blurred vision')">Blur</button>
<button onclick="setCC('pain')">Pain</button>
<button onclick="setCC('floaters')">Floaters</button>
</div>
<input id="cc">
<button onclick="next(2)">Next →</button>
</div>
</div>

<!-- STEP 2 -->
<div id="step2" class="step">
<div class="card">
<h3>IOP</h3>
<div class="row">
<button onclick="setIOP('od',15)">OD 15</button>
<button onclick="setIOP('od',25)">OD 25</button>
<button onclick="setIOP('os',15)">OS 15</button>
<button onclick="setIOP('os',25)">OS 25</button>
</div>
<input id="iop_od" placeholder="OD">
<input id="iop_os" placeholder="OS">
<button onclick="next(3)">Next →</button>
</div>
</div>

<!-- STEP 3 -->
<div id="step3" class="step">
<div class="card">
<h3>Visual Acuity</h3>
<div class="row">
<button onclick="setVA('od','20/20')">OD 20/20</button>
<button onclick="setVA('od','20/40')">OD 20/40</button>
<button onclick="setVA('os','20/20')">OS 20/20</button>
<button onclick="setVA('os','20/40')">OS 20/40</button>
</div>
<input id="va_od" placeholder="OD">
<input id="va_os" placeholder="OS">
<button onclick="next(4)">Next →</button>
</div>
</div>

<!-- STEP 4 -->
<div id="step4" class="step">
<div class="card">
<h3>Slit Lamp</h3>
<div class="row">
<button onclick="setSL('normal')">Normal</button>
<button onclick="setSL('dry eye')">Dry Eye</button>
<button onclick="setSL('inflammation')">Inflammation</button>
</div>
<input id="slitlamp">
<button onclick="next(5)">Next →</button>
</div>
</div>

<!-- STEP 5 -->
<div id="step5" class="step">
<div class="card">
<h3>Dilation</h3>
<div class="row">
<button onclick="setDil('Dilated')">Dilated</button>
<button onclick="setDil('Not Dilated')">Not Dilated</button>
</div>
<button onclick="next(6)">Next →</button>
</div>
</div>

<!-- STEP 6 -->
<div id="step6" class="step">
<div class="card">
<h3>Testing</h3>
<div id="testing"></div>
<button onclick="analyze()">Generate Plan</button>
</div>
</div>

<pre id="out"></pre>

</div>

<script>

const API = "https://ophth-ai.onrender.com";

// NAV
function next(n){
 document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
 document.getElementById("step"+n).classList.add('active');

 if(n===6) runTesting();
}

// SETTERS
function setCC(v){ cc.value=v; }
function setIOP(e,v){ e==='od'?iop_od.value=v:iop_os.value=v; }
function setVA(e,v){ e==='od'?va_od.value=v:va_os.value=v; }
function setSL(v){ slitlamp.value=v; }
function setDil(v){ window.dil=v; }

// TEST LOGIC
function runTesting(){

 let t=[];

 if(iop_od.value>22 || iop_os.value>22){
   t.push("OCT RNFL");
   t.push("Visual Field");
   t.push("Pachymetry");
 }

 if(cc.value.includes("blur")) t.push("Macular OCT");
 if(cc.value.includes("floaters")) t.push("Fundus Photo");

 testing.innerHTML=t.map(x=>`• ${x}`).join("<br>");
 window.tests=t;
}

// SOAP GENERATION
async function analyze(){

 let res=await fetch(API+"/ai",{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({
     cc:cc.value,
     va_od:va_od.value,
     va_os:va_os.value,
     iop_od:iop_od.value,
     iop_os:iop_os.value,
     history:slitlamp.value
   })
 });

 let data=await res.json();

 let soap = `
S: ${cc.value}

O:
VA OD: ${va_od.value}
VA OS: ${va_os.value}
IOP OD: ${iop_od.value}
IOP OS: ${iop_os.value}
Slit Lamp: ${slitlamp.value}
Dilation: ${window.dil}

A:
${data.result}

P:
Testing: ${tests.join(", ")}
Follow up based on findings
`;

 out.innerText = soap;
}

</script>

</body>
</html>
